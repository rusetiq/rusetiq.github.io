<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1b1c1d;
            --surface: #232527;
            --border: #34383b;
            --text: #e8dcc4;
            --muted: #cdbfa5;
            --accent: #e56a47;
            --font-display: 'Instrument Serif', Georgia, serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-display);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
            font-size: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        header {
            background-color: var(--bg);
            color: var(--text);
            padding: 4.5rem 0 3.5rem;
            text-align: center;
        }

        header h1 {
            font-size: 4.25rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.35rem;
            color: var(--muted);
            font-style: italic;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: var(--text);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--accent);
        }

        main {
            padding: 4rem 0;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .category-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .category-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        }

        .category-card h2 {
            font-size: 2.1rem;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 0.75rem;
        }

        .category-card p {
            color: var(--muted);
            font-size: 1.1rem;
        }

        .category-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .report-count {
            font-size: 0.95rem;
            color: var(--muted);
        }

        .arrow {
            font-size: 1.4rem;
            color: var(--accent);
        }

        footer {
            background-color: var(--bg);
            color: var(--text);
            text-align: center;
            padding: 2rem 0;
            margin-top: 4rem;
            border-top: 1px solid var(--border);
        }

        footer p {
            font-size: 0.95rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Reports</h1>
            <p>Research, analysis, and open-source intelligence</p>
            <a href="../index.html" class="back-link">&larr; Back to Portfolio</a>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="categories">
                <a href="osint/index.html" class="category-card">
                    <h2>Open Source Intelligence</h2>
                    <p>Flight tracking analysis, military aviation research, and geopolitical monitoring using publicly available data.</p>
                    <div class="category-meta">
                        <span class="report-count">1 report</span>
                        <span class="arrow">&rarr;</span>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Portfolio. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
